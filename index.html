<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const CATS = [
  {id:0,name:"Book of Mormon",emoji:"📖",col:"#e05c5c"},

];

// Each question now has a 'hints' array of 3 key concepts the player should hit
const INIT_QS = [
  {id:1,cat:0,
   q:"Critics claim there is absolutely no archaeological, genetic, or geological evidence to support the existence of the massive Nephite and Lamanite civilizations described in the Book of Mormon — civilizations supposedly including elaborate cities, armies of hundreds of thousands, horses, steel weapons, wheat, chariots, and silk. Professional archaeologists working throughout Mesoamerica and North America have never found a single artifact, burial site, or ruin consistent with the text's timeline, and critics argue this total scientific silence is fatal to the book's historicity.",
   ans:"LDS apologists point out that absence of evidence is not evidence of absence. Less than 1% of ancient Mesoamerican sites have been fully excavated. Scholars like John Sorenson identified extensive cultural parallels with Maya and Olmec civilizations. The Book of Mormon depicts a remnant people intermingled with much larger indigenous populations, so no dominant Nephite archaeological signature would necessarily be expected. Organic materials like wood, cloth, and leather degrade quickly in tropical climates.",
   hints:["Absence of evidence is not evidence of absence — most ancient civilizations left minimal traces","Less than 1% of Mesoamerican sites have been excavated, so the record is far from complete","The Book of Mormon describes a small group absorbed into a larger population, so no dominant 'Nephite signature' would be expected"],
   scr:"Hebrews 11:1",scrN:"Faith is the substance of things hoped for — archaeological proof is not the scriptural standard for spiritual truth",wrong:["John 20:29","Romans 1:20"]},

  {id:2,cat:0,
   q:"DNA studies consistently show that Native American ancestry traces to northeast Asia via the Bering land bridge, with no detectable Middle Eastern or Israelite genetic markers of the kind the Book of Mormon's narrative would require. Lehi's family supposedly left Jerusalem around 600 BC and became primary ancestors of indigenous Americans. Critics argue comprehensive genetic testing of thousands of ancient and modern Native American samples across the entire Western Hemisphere directly and conclusively disproves this central foundational claim.",
   ans:"LDS apologists explain that Lehi's small founding family would have their genetic signature completely absorbed into an already-populated continent within a few hundred years through genetic drift, admixture, and founder bottleneck effects. The Book of Mormon never claims Lehi's family were the only inhabitants — they arrived to a populated land. The Church's Gospel Topics Essay on DNA openly acknowledges this complexity.",
   hints:["A small founding family's DNA gets absorbed into a much larger existing population within a few generations — it disappears statistically","The Book of Mormon never claims Lehi's family were the only people in the Americas — they arrived to an already populated land","The Church's own Gospel Topics Essay on DNA openly acknowledges this and explains why no Israelite markers would be expected"],
   scr:"Acts 17:26",scrN:"God made all nations from one blood — consistent with small founding populations whose distinct markers become absorbed over time",wrong:["Genesis 10:32","Romans 5:12"]},

  {id:3,cat:1,
   q:"When the papyri Joseph Smith used to produce the Book of Abraham were rediscovered at the Metropolitan Museum of Art in 1966, professional Egyptologists definitively identified them as standard 1st-century AD Egyptian funerary documents — the Book of Breathings Made by Isis — with zero connection to Abraham. Multiple independent Egyptologists confirmed the actual hieroglyphic text bears no resemblance whatsoever to Joseph Smith's claimed translation.",
   ans:"LDS apologists offer two main defenses. First, the Missing Scroll theory: historical inventories suggest Joseph possessed a longer scroll now lost, which may have been the actual source. Second, the Catalyst theory supported in the Church's Gospel Topics Essay: the papyri served as a spiritual prompt and the actual text was received through independent revelation.",
   hints:["The Missing Scroll theory — Joseph likely had a longer scroll that is now lost, and the surviving fragments may not be the actual source text","The Catalyst theory — the papyri may have prompted revelation without being the literal source, similar to how a picture can prompt prayer","The Church's own Gospel Topics Essay openly addresses this and supports the catalyst interpretation"],
   scr:"Amos 3:7",scrN:"God reveals his secrets through his prophets — revelation can occur independently of any physical text source",wrong:["Hebrews 1:1","2 Peter 1:21"]},

  {id:4,cat:1,
   q:"Professional Egyptologists universally agree that Joseph Smith's explanations of the facsimiles in the Book of Abraham are demonstrably incorrect. Facsimile 1 depicts Anubis performing a standard embalming ritual — not an angel stopping a human sacrifice. Facsimile 3 shows a conventional Egyptian throne-room funerary court scene — not Abraham teaching astronomy to Pharaoh.",
   ans:"LDS Egyptologists argue that Egyptian facsimiles were deliberately polysemous — designed to carry multiple valid ritual interpretations depending on liturgical context. The Abrahamic tradition genuinely existed in ancient Egypt, verified by extra-biblical sources, making a connection between Abraham's biography and Egyptian imagery historically plausible.",
   hints:["Egyptian religious images were deliberately designed to carry multiple meanings — they weren't meant to have only one correct interpretation","Ancient Abraham traditions genuinely existed in Egypt, verified by texts like the Apocalypse of Abraham, making the connection historically plausible","Critics assume only one correct reading exists, but ancient Egyptian iconography intentionally layered multiple ritual meanings simultaneously"],
   scr:"Genesis 12:10",scrN:"Abraham's actual documented sojourn in Egypt establishes the authentic historical connection",wrong:["Exodus 3:14","Hebrews 7:1"]},

  {id:5,cat:2,
   q:"Joseph Smith gave multiple significantly different accounts of the First Vision. The earliest known 1832 account mentions only Christ appearing with no mention of God the Father. The 1835 account introduces heavenly angels. The official 1838 account — published decades later — describes both God the Father and Jesus Christ appearing and condemning every existing Christian church. Critics argue this pattern of escalating accounts over twelve years demonstrates the narrative was invented over time.",
   ans:"LDS apologists note that multiple accounts of the same profound event naturally vary in emphasis depending on audience, purpose, and time — all four Gospel accounts of Christ's resurrection differ significantly in detail without undermining the event's historicity. The 1832 account was a private journal entry emphasizing personal spiritual transformation.",
   hints:["Multiple accounts of a real event always vary in detail — all four Gospels describe the resurrection differently without undermining it","The 1832 account was a private journal entry, not a public proclamation, so it naturally emphasizes personal spiritual aspects","Different audiences and purposes naturally draw out different details — this is normal for any profound life experience, not evidence of fabrication"],
   scr:"James 1:5",scrN:"Ask of God who gives wisdom generously — the exact scripture Joseph was reading that prompted the First Vision",wrong:["Matthew 3:16","John 1:18"]},

  {id:6,cat:2,
   q:"In 1843 a set of brass plates discovered in Illinois was brought to Joseph Smith. Contemporary accounts say he declared he could translate them, claiming they contained history of a descendant of Ham. However, definitive metallurgical analysis in 1980 confirmed the Kinderhook plates were deliberate 19th-century forgeries. Critics argue this conclusively demonstrates Joseph Smith had no genuine prophetic translation ability.",
   ans:"LDS apologists note that evidence Joseph actually completed a formal translation of the Kinderhook plates is more disputed than critics acknowledge. The primary source claiming a translation occurred was William Clayton's journal — a secondhand account. Joseph's own journal from that period is more ambiguous and noncommittal.",
   hints:["The main claim that Joseph 'translated' them comes from a secondhand account in William Clayton's journal — Joseph's own journal is far more ambiguous","Joseph expressed general interest in the plates but there is no document showing he ever produced a completed formal translation","This is very different from the Book of Mormon where multiple witnesses observed an extended translation process over many months"],
   scr:"Deuteronomy 18:22",scrN:"If a prophet's word does not come to pass, God did not send him — no formal Kinderhook translation was ever produced",wrong:["1 John 4:1","Matthew 7:15"]},

  {id:7,cat:3,
   q:"For decades throughout the 19th century, senior LDS Church leaders including Joseph Smith publicly and emphatically denied practicing polygamy even while secretly maintaining multiple simultaneous marriages. Joseph Smith denied polygamy as late as May 1844 — the year of his death — despite having over 30 documented wives. Critics argue this sustained deception by men claiming divine prophetic authority fundamentally undermines their credibility.",
   ans:"LDS apologists acknowledge this is a genuinely difficult historical and moral complexity. Leaders operated within a theological framework where celestial marriage was considered too dangerous to disclose publicly in a violently hostile environment where armed mobs had already murdered members. Others contextualize it alongside the serious documented failures of beloved biblical prophets.",
   hints:["The denials happened in a context of real physical danger — mobs had already murdered members and driven the Church from multiple states","LDS theology acknowledges prophets are fallible men — David, Moses, and Peter all had serious moral failures without losing their prophetic calling","Some apologists distinguish between protecting sacred things from hostile enemies versus malicious deception intended to harm innocent people"],
   scr:"Romans 3:23",scrN:"All have sinned and fall short — prophetic fallibility is consistent with the entire biblical pattern",wrong:["Proverbs 12:22","Exodus 20:16"]},

  {id:8,cat:3,
   q:"Historical evidence clearly documents that senior LDS Church leaders continued secretly performing and personally entering new plural marriages well after the 1890 Manifesto — some as late as 1904, conducted in Mexico and Canada to evade American federal jurisdiction. President Joseph F. Smith admitted to Congress in 1904 that he had continued cohabiting with his plural wives after the Manifesto.",
   ans:"LDS apologists acknowledge post-Manifesto polygamy occurred and represents genuine complexity. The Church's own Gospel Topics Essay addresses this honestly. The definitive Second Manifesto of 1904 more decisively ended the practice. Apologists argue the 1890 Manifesto represented genuine divine guidance in extreme political context.",
   hints:["The Church's own Gospel Topics Essay openly acknowledges this happened and does not try to hide it","The 1890 Manifesto was specifically about not performing new plural marriages — some leaders interpreted existing marriages differently","The Second Manifesto in 1904 far more definitively and publicly ended all polygamous activity, showing the Church moved toward full compliance"],
   scr:"Romans 13:1",scrN:"Submit to governing authorities — the 1890 Manifesto as divinely-guided accommodation to overwhelming legal reality",wrong:["Acts 5:29","Daniel 3:16"]},

  {id:9,cat:4,
   q:"From the founding of the LDS Church until June 1978 — a span of nearly 130 years — Black members were systematically barred from the Melchizedek priesthood and completely excluded from all temple ordinances. Early leaders including Brigham Young repeatedly taught this ban was divinely mandated, connected to the curse of Cain or pre-mortal choices. Critics argue the 1978 reversal came solely due to social pressure and Brazilian temple practicality — proving Church leadership is not divinely guided.",
   ans:"The Church's own Gospel Topics Essay on Race and the Priesthood explicitly acknowledges the ban's true origins are not entirely clear and unequivocally disavows all past theological justifications. Spencer W. Kimball and the entire Quorum of the Twelve described a powerfully unmistakable Spirit-filled experience during extended prayer in the Salt Lake Temple in 1978.",
   hints:["The Church's own Gospel Topics Essay openly disavows all past theological justifications like the Curse of Cain — the Church itself admits those reasons were wrong","President Kimball and all the Apostles described an undeniable spiritual experience in the Salt Lake Temple during extended prayer in 1978","The Brazil temple was announced two full years before the 1978 revelation, undermining the claim it was purely a practical decision about Brazil"],
   scr:"Acts 10:34",scrN:"God is no respecter of persons — Peter's vision extending the Gospel to Gentiles is the direct biblical parallel",wrong:["Galatians 3:28","Colossians 3:11"]},

  {id:10,cat:4,
   q:"The Book of Mormon in 2 Nephi 5:21 describes a skin of blackness as a curse placed upon the Lamanites for rebellion against God. The pre-1981 edition of 2 Nephi 30:6 promised repentant Lamanites would become white and delightsome. In 1981 the Church quietly changed this phrase to pure and delightsome without formal announcement. Critics argue these passages establish a foundational racial theology connecting dark skin to divine punishment.",
   ans:"LDS apologists argue that skin of blackness in the Book of Mormon's covenant narrative context refers to a spiritual or cultural mark of separation rather than literal racial skin color. Many Old Testament texts use similar mark language in explicitly non-racial ways. The Church's Gospel Topics Essay explicitly disavows any theology linking dark skin to divine punishment.",
   hints:["In the Book of Mormon's covenant context, the mark likely refers to cultural or spiritual separation — not literal skin color or racial hierarchy","Many Old Testament passages use 'mark' language in clearly non-racial ways, showing this is a biblical pattern not unique to the Book of Mormon","The Church's Gospel Topics Essay explicitly and completely disavows any theology connecting skin color to spiritual standing or divine punishment"],

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}

function calcPoints(elapsedSecs){
  if(elapsedSecs<=300)return 10;
  const minsOver=Math.floor((elapsedSecs-300)/60);
  return Math.max(0,10-2*(minsOver+1));
}

function drawWheel(canvas,angle){
  if(!canvas)return;
  const ctx=canvas.getContext('2d'),cx=210,cy=210,r=200,n=CATS.length,arc=Math.PI*2/n;
  ctx.clearRect(0,0,420,420);
  for(let i=0;i<n;i++){
    const st=angle+i*arc-Math.PI/2,en=st+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,st,en);ctx.closePath();
    ctx.fillStyle=CATS[i].col;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(st+arc/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 11px Nunito,sans-serif';
    ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=3;
    let lbl=CATS[i].emoji+' '+CATS[i].name;if(lbl.length>18)lbl=lbl.slice(0,18)+'…';
    ctx.fillText(lbl,r-10,4);ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,24,0,Math.PI*2);
  ctx.fillStyle='#1a1a2e';ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,.8)';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#ffd700';ctx.font='bold 13px Nunito,sans-serif';ctx.textAlign='center';ctx.fillText('SF',cx,cy+5);
}

function getWheelCat(angle){
  const n=CATS.length,arc=Math.PI*2/n;
  const a=((-angle-Math.PI/2)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  return Math.floor(a/arc)%n;
}

function ConfettiCanvas({parts}){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    cv.width=window.innerWidth;cv.height=window.innerHeight;
    const ctx=cv.getContext('2d');
    const state=parts.map(p=>({...p}));
    let fr=0,raf;
    const draw=()=>{
      ctx.clearRect(0,0,cv.width,cv.height);
      state.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=0.05;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.col;ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);ctx.restore();
      });
      if(fr++<120)raf=requestAnimationFrame(draw);
    };
    raf=requestAnimationFrame(draw);
    return()=>cancelAnimationFrame(raf);
  },[parts]);
  return <canvas ref={ref} className="confetti-canvas"/>;
}

const MEDALS=['🥇','🥈','🥉'];
const DEFAULT_NAMES=['Player 1','Player 2','Player 3'];

function App(){
  const [screen,setScreen]=useState('setup');
  const [numPlayers,setNumPlayers]=useState(2);
  const [playerNames,setPlayerNames]=useState(['Player 1','Player 2','Player 3']);
  const [players,setPlayers]=useState([]);
  const [current,setCurrent]=useState(0);
  const [round,setRound]=useState(0);
  const [usedIds,setUsedIds]=useState([]);
  const [currentQ,setCurrentQ]=useState(null);
  const [isSteal,setIsSteal]=useState(false);
  const [stealQueue,setStealQueue]=useState([]);
  const [timerSecs,setTimerSecs]=useState(TIMER_TOTAL);
  const [timerStart,setTimerStart]=useState(null);
  const [answer,setAnswer]=useState('');
  const [submitDisabled,setSubmitDisabled]=useState(false);
  const [submitLabel,setSubmitLabel]=useState('📝 Submit Answer');
  const [feedback,setFeedback]=useState(null);
  const [bonusOpts,setBonusOpts]=useState([]);
  const [bonusPicked,setBonusPicked]=useState(null);
  const [flashRed,setFlashRed]=useState(false);
  const [confettiParts,setConfettiParts]=useState([]);
  const [qs,setQs]=useState(INIT_QS);
  const [wheelAngle,setWheelAngle]=useState(0);
  const [spinning,setSpinning]=useState(false);
  const [landedCat,setLandedCat]=useState(null);
  const [hintShown,setHintShown]=useState(false);
  const [hintPenaltyApplied,setHintPenaltyApplied]=useState(false);
  const [adminQ,setAdminQ]=useState({cat:0,q:'',ans:'',scr:'',scrN:'',w1:'',w2:'',h1:'',h2:'',h3:''});
  const [adminMsg,setAdminMsg]=useState('');
  const [adminPw,setAdminPw]=useState('');
  const [showAdminLogin,setShowAdminLogin]=useState(false);
  const [listening,setListening]=useState(false);
  const [micStatus,setMicStatus]=useState('');
  const wheelRef=useRef(null);
  const timerRef=useRef(null);
  const recognitionRef=useRef(null);
  const MAX_ROUNDS=10;
  const micSupported=!!(window.SpeechRecognition||window.webkitSpeechRecognition);

  useEffect(()=>{drawWheel(wheelRef.current,wheelAngle);},[wheelAngle]);

  useEffect(()=>{
    if(screen!=='question'){clearInterval(timerRef.current);return;}
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      const elapsed=(Date.now()-timerStart)/1000;
      const rem=Math.max(0,TIMER_TOTAL-elapsed);
      setTimerSecs(rem);
      if(rem<=0){clearInterval(timerRef.current);handleTimeOut();}
    },250);
    return()=>clearInterval(timerRef.current);
  },[screen,timerStart]);

  const getElapsed=useCallback(()=>(Date.now()-timerStart)/1000,[timerStart]);
  const getTimeScore=useCallback(()=>calcPoints(getElapsed()),[getElapsed]);

  const doConfetti=()=>{
    const cols=['#ffd700','#e05c5c','#5aab6a','#4a84d4','#9b5fd4'];
    setConfettiParts(Array.from({length:80},(_,i)=>({
      id:i,x:Math.random()*window.innerWidth,y:-20,
      vx:(Math.random()-.5)*5,vy:Math.random()*5+2,
      col:cols[Math.floor(Math.random()*cols.length)],
      sz:Math.random()*8+4,rot:Math.random()*360,rv:(Math.random()-.5)*8,
    })));
    setTimeout(()=>setConfettiParts([]),2800);
  };

  const doRedFlash=()=>{setFlashRed(true);setTimeout(()=>setFlashRed(false),700);};

  const addPoints=(pi,cat,pts)=>{
    setPlayers(prev=>prev.map((p,i)=>{
      if(i!==pi)return p;
      return{...p,total:p.total+pts,cats:{...p.cats,[cat]:(p.cats[cat]||0)+pts}};
    }));
  };

  const getAvailCats=useCallback((ids=usedIds)=>{
    return CATS.filter(c=>qs.some(q=>q.cat===c.id&&!ids.includes(q.id))).map(c=>c.id);
  },[qs,usedIds]);

  const stopMic=()=>{
    if(recognitionRef.current){try{recognitionRef.current.stop();}catch(e){}recognitionRef.current=null;}
    setListening(false);setMicStatus('');
  };

  const toggleMic=()=>{
    if(!micSupported){alert('Voice input is not supported in this browser. Please use Chrome or Safari.');return;}
    if(listening){stopMic();return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();
    rec.continuous=true;rec.interimResults=true;rec.lang='en-US';
    rec.onstart=()=>{setListening(true);setMicStatus('🎤 Listening… speak your answer');};
    rec.onresult=(e)=>{
      let interim='',finalText='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal)finalText+=t;else interim+=t;
      }
      if(finalText)setAnswer(prev=>{const b=prev.trim();return b?b+' '+finalText.trim():finalText.trim();});
      setMicStatus(interim?'💬 '+interim:'🎤 Listening… speak your answer');
    };
    rec.onerror=(e)=>{setMicStatus('❌ Mic error: '+e.error);setListening(false);recognitionRef.current=null;};
    rec.onend=()=>{setListening(false);setMicStatus('✅ Done — review your answer and submit');recognitionRef.current=null;};
    recognitionRef.current=rec;rec.start();
  };

  const showHint=()=>{
    if(hintShown)return;
    setHintShown(true);
    if(!hintPenaltyApplied){
      setHintPenaltyApplied(true);
      // Deduct 3 points from current player (floor at 0 total)
      setPlayers(prev=>prev.map((p,i)=>{
        if(i!==current)return p;
        return{...p,total:Math.max(0,p.total-HINT_PENALTY)};
      }));
    }
  };

  const spinWheel=()=>{
    if(spinning)return;
    const avail=getAvailCats();
    if(!avail.length){doEndGame();return;}
    setSpinning(true);setLandedCat(null);
    const tgt=avail[Math.floor(Math.random()*avail.length)];
    const n=CATS.length,arc=Math.PI*2/n;
    const extra=(8+Math.floor(Math.random()*5))*Math.PI*2;
    const sliceRandom=(Math.random()*.7+.15)*arc;
    const finalAngle=-Math.PI/2-tgt*arc-sliceRandom+extra;
    const startA=wheelAngle,dur=3800,t0=performance.now();
    const step=(ts)=>{
      let t=(ts-t0)/dur;if(t>1)t=1;
      const ease=1-Math.pow(1-t,3);
      const ang=startA+ease*(finalAngle-startA);
      setWheelAngle(ang);
      if(t<1){requestAnimationFrame(step);}
      else{
        setSpinning(false);
        const cat=getWheelCat(ang);
        setLandedCat(cat);
        setTimeout(()=>{setLandedCat(null);launchQuestion(cat,false,[]);},1800);
      }
    };
    requestAnimationFrame(step);
  };

  const launchQuestion=(catIdx,steal,queue,ids=usedIds)=>{
    let pool=shuffle(qs.filter(q=>q.cat===catIdx&&!ids.includes(q.id)));
    if(!pool.length)pool=shuffle(qs.filter(q=>!ids.includes(q.id)));
    if(!pool.length){doEndGame();return;}
    const q=pool[0];
    setUsedIds([...ids,q.id]);
    setCurrentQ(q);setIsSteal(steal);setStealQueue(queue);
    setAnswer('');setSubmitDisabled(false);setSubmitLabel('📝 Submit Answer');
    setTimerStart(Date.now());setTimerSecs(TIMER_TOTAL);
    setHintShown(false);setHintPenaltyApplied(false);
    stopMic();setMicStatus('');
    setScreen('question');
  };

  const handleTimeOut=()=>{
    clearInterval(timerRef.current);setSubmitDisabled(true);stopMic();doRedFlash();
    const others=players.map((_,i)=>i).filter(i=>i!==current);
    if(others.length>0){
      const nextStealer=others[0],rest=others.slice(1);
      setFeedback({emoji:'⏰',ptsText:"Time's up! 0 pts",ptsCol:'#e05c5c',
        text:'No answer in time.',apol:currentQ?currentQ.ans:'',scr:currentQ?currentQ.scr+' — '+currentQ.scrN:'',
        onClose:()=>{
          setFeedback(null);setCurrent(nextStealer);setIsSteal(true);setStealQueue(rest);
          setTimerStart(Date.now());setTimerSecs(TIMER_TOTAL);
          setSubmitDisabled(false);setSubmitLabel('📝 Submit Answer');
          setHintShown(false);setHintPenaltyApplied(false);
          setScreen('question');
        },
      });
    } else {
      setFeedback({emoji:'⏰',ptsText:"Time's up! 0 pts",ptsCol:'#e05c5c',
        text:'No points awarded.',apol:currentQ?currentQ.ans:'',scr:currentQ?currentQ.scr+' — '+currentQ.scrN:'',
        onClose:()=>{setFeedback(null);advanceTurn();},
      });
    }
  };

  const submitAnswer=async()=>{
    if(!answer.trim())return;
    clearInterval(timerRef.current);stopMic();
    const ts=getTimeScore();
    const penaltyNote=hintPenaltyApplied?' (Note: 3-point hint penalty was already deducted from score)':'';
    setSubmitDisabled(true);setSubmitLabel('⏳ Evaluating…');
    let rating='wrong',fbText='';
    try{
      const resp=await fetch('/api/evaluate',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:400,
          system:'You are a fair and encouraging judge in an LDS apologetics trivia game played by everyday Church members — not scholars. Evaluate whether the player demonstrates understanding of the CORE apologetic principle, not whether they mention every scholar or detail. Award "correct" if they clearly understand the main apologetic response even if they do not cite specific historians or name every argument. Award "partial" if they show genuine awareness of the topic but miss the central point. Award "wrong" only if their answer is clearly off-track or shows no understanding of the apologetic response. Be generous — reward conceptual understanding over encyclopedic completeness. Reply ONLY with valid JSON: {"rating":"correct|partial|wrong","feedback":"1-2 encouraging sentences explaining the rating and what the ideal answer focuses on"}',
          messages:[{role:'user',content:'CRITICISM:\n'+currentQ.q+'\n\nKEY CONCEPTS TO HIT:\n'+currentQ.hints.map((h,i)=>(i+1)+'. '+h).join('\n')+'\n\nIDEAL ANSWER:\n'+currentQ.ans+'\n\nPLAYER ANSWER:\n'+answer+penaltyNote}],
        }),
      });
      const data=await resp.json();
      const raw=(data.content&&data.content[0]&&data.content[0].text)||'{}';
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      rating=parsed.rating||'wrong';fbText=parsed.feedback||'';
    }catch(e){fbText='Could not evaluate: '+e.message;rating='wrong';}
    setSubmitLabel('📝 Submit Answer');
    let pts=0,emoji='❌',ptsCol='#e05c5c';
    if(rating==='correct'){pts=ts;emoji='🎉';ptsCol='#5aab6a';}
    else if(rating==='partial'){pts=Math.ceil(ts/2);emoji='🤔';ptsCol='#c4a63a';}
    if(pts>0){addPoints(current,currentQ.cat,pts);doConfetti();}
    else doRedFlash();
    const currentStealQueue=stealQueue;
    setFeedback({
      emoji,ptsText:pts>0?'+'+pts+' points!':'0 points',ptsCol,
      text:fbText+(hintPenaltyApplied?' (−3 hint penalty already applied)':''),
      apol:currentQ.ans,scr:currentQ.scr+' — '+currentQ.scrN,
      onClose:()=>{
        setFeedback(null);
        if(pts>0){showBonus();}
        else if(currentStealQueue.length>0){
          const nextStealer=currentStealQueue[0],rest=currentStealQueue.slice(1);
          setFeedback({emoji:'🔥',ptsText:'STEAL!',ptsCol:'#9b5fd4',
            text:(players[nextStealer]?players[nextStealer].name:'Next player')+', steal opportunity! Answer for points.',
            apol:'',scr:'',
            onClose:()=>{
              setCurrent(nextStealer);setIsSteal(true);setStealQueue(rest);
              setTimerStart(Date.now());setTimerSecs(TIMER_TOTAL);
              setSubmitDisabled(false);setSubmitLabel('📝 Submit Answer');setAnswer('');
              setHintShown(false);setHintPenaltyApplied(false);
              setMicStatus('');setFeedback(null);setScreen('question');
            },
          });
        } else advanceTurn();
      },
    });
  };

  const skipQuestion=()=>{
    clearInterval(timerRef.current);setSubmitDisabled(true);stopMic();doRedFlash();
    const others=players.map((_,i)=>i).filter(i=>i!==current);
    if(others.length>0){
      const nextStealer=others[0],rest=others.slice(1);
      setFeedback({emoji:'⏭️',ptsText:'Skipped',ptsCol:'#aaa',
        text:(players[current]?players[current].name:'Player')+' skipped. '+(players[nextStealer]?players[nextStealer].name:'Next player')+', steal opportunity!',
        apol:currentQ.ans,scr:'',
        onClose:()=>{
          setCurrent(nextStealer);setIsSteal(true);setStealQueue(rest);
          setTimerStart(Date.now());setTimerSecs(TIMER_TOTAL);
          setSubmitDisabled(false);setSubmitLabel('📝 Submit Answer');setAnswer('');
          setHintShown(false);setHintPenaltyApplied(false);
          setMicStatus('');setFeedback(null);setScreen('question');
        },
      });
    } else {
      setFeedback({emoji:'⏭️',ptsText:'0 pts',ptsCol:'#aaa',text:'No points awarded.',
        apol:currentQ.ans,scr:currentQ.scr+' — '+currentQ.scrN,
        onClose:()=>{setFeedback(null);advanceTurn();},
      });
    }
  };

  const showBonus=()=>{
    const opts=shuffle([
      {ref:currentQ.scr,note:currentQ.scrN,correct:true},
      {ref:currentQ.wrong[0],note:'',correct:false},
      {ref:currentQ.wrong[1],note:'',correct:false},
    ]);
    setBonusOpts(opts);setBonusPicked(null);setScreen('bonus');
  };

  const pickBonus=(idx)=>{
    setBonusPicked(idx);
    const opt=bonusOpts[idx];
    if(opt.correct){
      addPoints(current,currentQ.cat,10);doConfetti();
      setTimeout(()=>{setFeedback({emoji:'📖',ptsText:'+10 Bonus!',ptsCol:'#ffd700',
        text:'Correct! '+opt.ref+(opt.note?' — '+opt.note:''),apol:'',scr:'',onClose:advanceTurn});},700);
    } else {
      doRedFlash();
      setTimeout(()=>{setFeedback({emoji:'📖',ptsText:'0 Bonus',ptsCol:'#e05c5c',
        text:'Correct answer: '+currentQ.scr+' — '+currentQ.scrN,apol:'',scr:'',onClose:advanceTurn});},700);
    }
  };

  const advanceTurn=()=>{
    setFeedback(null);setIsSteal(false);setStealQueue([]);
    const nextRound=round+1;
    if(nextRound>=MAX_ROUNDS||!getAvailCats().length){doEndGame();return;}
    setRound(nextRound);setCurrent(nextRound%numPlayers);setScreen('spin');
  };

  const doEndGame=()=>{setFeedback(null);setScreen('final');doConfetti();};

  const startGame=()=>{
    const ps=Array.from({length:numPlayers},(_,i)=>({name:playerNames[i]||DEFAULT_NAMES[i],total:0,cats:{}}));
    setPlayers(ps);setRound(0);setCurrent(0);setUsedIds([]);setIsSteal(false);setStealQueue([]);
    setWheelAngle(0);setLandedCat(null);setQs(shuffle(INIT_QS));setScreen('spin');
  };

  const resetGame=()=>{
    stopMic();setScreen('setup');setPlayers([]);setNumPlayers(2);
    setPlayerNames(['Player 1','Player 2','Player 3']);setCurrent(0);setRound(0);setUsedIds([]);
    setCurrentQ(null);setIsSteal(false);setStealQueue([]);setTimerSecs(TIMER_TOTAL);setTimerStart(null);
    setAnswer('');setSubmitDisabled(false);setSubmitLabel('📝 Submit Answer');setFeedback(null);
    setBonusOpts([]);setBonusPicked(null);setFlashRed(false);setConfettiParts([]);setQs(INIT_QS);
    setWheelAngle(0);setSpinning(false);setLandedCat(null);
    setHintShown(false);setHintPenaltyApplied(false);
    setAdminQ({cat:0,q:'',ans:'',scr:'',scrN:'',w1:'',w2:'',h1:'',h2:'',h3:''});
    setAdminMsg('');setAdminPw('');setShowAdminLogin(false);setListening(false);setMicStatus('');
  };

  const timerPct=timerSecs/TIMER_TOTAL;
  const circ=2*Math.PI*30;
  const timerCol=timerSecs>300?'#5aab6a':timerSecs>150?'#c4a63a':'#e05c5c';
  const timerM=Math.floor(timerSecs/60),timerS=Math.floor(timerSecs%60);
  const elapsed=timerStart?(Date.now()-timerStart)/1000:0;
  const currentPts=calcPoints(elapsed);
  const inFullPtZone=timerSecs>300;
  const rankedPlayers=players.length>0?[...players].map((p,i)=>({...p,idx:i})).sort((a,b)=>b.total-a.total):[];

  return (
    <>
      {confettiParts.length>0&&<ConfettiCanvas parts={confettiParts}/>}
      <div className="red-flash" style={{background:flashRed?'rgba(224,92,92,.35)':'transparent'}}/>

      {feedback&&(
        <div className="fb-overlay">
          <div className="fb-box">
            <div className="fb-emoji">{feedback.emoji}</div>
            <div className="fb-pts" style={{color:feedback.ptsCol}}>{feedback.ptsText}</div>
            <div className="fb-text">{feedback.text}</div>
            {feedback.apol&&<div className="fb-apol"><h4>📚 LDS Apologetic Response:</h4><p>{feedback.apol}</p></div>}
            {feedback.scr&&<div className="fb-apol"><h4>📖 Key Scripture:</h4><p>{feedback.scr}</p></div>}
            <button className="btn btn-gold" style={{marginTop:10}} onClick={()=>{setFeedback(null);feedback.onClose&&feedback.onClose();}}>Continue →</button>
          </div>
        </div>
      )}

      {showAdminLogin&&(
        <div className="fb-overlay">
          <div className="fb-box" style={{maxWidth:360}}>
            <div style={{fontSize:'1.8rem',fontWeight:900,color:'#ffd700',marginBottom:14}}>⚙️ Admin Login</div>
            <input type="password" placeholder="Password" value={adminPw} onChange={e=>setAdminPw(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){if(adminPw==='Timothy'){setShowAdminLogin(false);setScreen('admin');}else alert('Wrong password.');}}}/>
            <div className="btn-row">
              <button className="btn btn-gold" onClick={()=>{if(adminPw==='Timothy'){setShowAdminLogin(false);setScreen('admin');}else alert('Wrong password.');}}>Enter</button>
              <button className="btn btn-red" onClick={()=>setShowAdminLogin(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* SETUP */}
      <div className={`screen${screen==='setup'?' active':''}`} style={{background:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)'}}>
        <div className="title">🏛️ Sure Foundation</div>
        <div className="subtitle">LDS Apologetics Trivia Challenge</div>
        <div className="card">
          <h2>👥 How Many Players?</h2>
          <div className="pcount-row">
            {[1,2,3].map(n=>(
              <button key={n} className={`pcount-btn${numPlayers===n?' selected':''}`} onClick={()=>setNumPlayers(n)}>
                {n} {n===1?'Player':'Players'}
              </button>
            ))}
          </div>
          {Array.from({length:numPlayers},(_,i)=>(
            <div key={i} className="player-input-row">
              <span>{MEDALS[i]}</span>
              <input value={playerNames[i]} onChange={e=>{const n=[...playerNames];n[i]=e.target.value;setPlayerNames(n);}} placeholder={DEFAULT_NAMES[i]}/>
            </div>
          ))}
        </div>
        <div className="card" style={{maxWidth:520}}>
          <h2>⏱️ Timer & Hints</h2>
          <p style={{color:'#ccc',fontSize:'.9rem',lineHeight:1.7}}>
            Each question gives you <strong style={{color:'#ffd700'}}>10 minutes</strong> to answer.<br/>
            Full <strong style={{color:'#5aab6a'}}>10 points</strong> for answering within the first <strong style={{color:'#5aab6a'}}>5 minutes</strong>.<br/>
            After 5 minutes you lose <strong style={{color:'#c4a63a'}}>2 points per minute</strong>.<br/>
            Tap <strong style={{color:'#c4a63a'}}>💡 Show Key Concepts</strong> for hints — costs <strong style={{color:'#e05c5c'}}>−3 points</strong>.
          </p>
        </div>
        <div className="btn-row">
          <button className="btn btn-gold" onClick={startGame}>🎯 Start Game</button>
          <button className="btn btn-blue" onClick={()=>setShowAdminLogin(true)}>⚙️ Admin Panel</button>
        </div>
      </div>

      {/* SPIN */}
      <div className={`screen${screen==='spin'?' active':''}`} style={{background:'linear-gradient(135deg,#0f3460,#16213e)'}}>
        <div className="score-cards">
          {players.map((p,i)=>(
            <div key={i} className={`sc${i===current?' active':''}`}>
              <div className="sc-name">{p.name}</div>
              <div className="sc-pts">{p.total}</div>
            </div>
          ))}
        </div>
        <div className="round-label">Round {round+1} of {MAX_ROUNDS}</div>
        <div className="spin-wrap">
          <div className="spin-pointer">▼</div>
          <canvas ref={wheelRef} id="wheelCanvas" width={420} height={420}/>
        </div>
        <div className="spin-player">{players[current]?players[current].name:'...'}'s turn — spin the wheel!</div>
        {landedCat!==null
          ?<div className="cat-reveal" style={{background:CATS[landedCat].col}}>
              <div className="cat-reveal-emoji">{CATS[landedCat].emoji}</div>
              <div className="cat-reveal-name">{CATS[landedCat].name}</div>
            </div>
          :<button className="btn btn-gold" onClick={spinWheel} disabled={spinning}>{spinning?'🎡 Spinning…':'🎡 Spin the Wheel!'}</button>
        }
      </div>

      {/* QUESTION */}
      <div className={`screen${screen==='question'?' active':''}`} style={{background:'linear-gradient(135deg,#1a1a2e,#16213e)'}}>
        <div className="q-scorebar">
          {players.map((p,i)=>(
            <div key={i} className={`qpc${i===current?' active':''}`}>
              <div className="qpc-name">{p.name}</div>
              <div className="qpc-pts">{p.total}</div>
              <div className="cat-dots">
                {CATS.map(c=><div key={c.id} className={`cat-dot${(p.cats[c.id]||0)>0?' earned':''}`} style={{background:c.col}}/>)}
              </div>
            </div>
          ))}
        </div>
        <div className="q-topbar">
          {currentQ&&<div className="cat-badge" style={{background:CATS[currentQ.cat].col}}>{CATS[currentQ.cat].emoji} {CATS[currentQ.cat].name}</div>}
          <div className="timer-wrap">
            <svg className="timer-svg" viewBox="0 0 72 72">
              <circle className="timer-bg" cx="36" cy="36" r="30"/>
              <circle className="timer-fg" cx="36" cy="36" r="30" strokeDasharray={circ} strokeDashoffset={circ*(1-timerPct)} stroke={timerCol}/>
            </svg>
            <div className="timer-num" style={{color:timerCol}}>{timerM}:{timerS<10?'0':''}{timerS}</div>
          </div>
        </div>
        <div className="timer-status">
          <span style={{color:'#aaa',fontSize:'.82rem'}}>⏱️ Answer now for:</span>
          <span style={{fontWeight:700,color:inFullPtZone?'#5aab6a':'#c4a63a'}}>
            {inFullPtZone?'🟢 Full 10 points!':'🟡 '+currentPts+' points (decaying)'}
          </span>
        </div>
        {isSteal&&(
          <div className="steal-banner">
            <div style={{fontSize:'1.2rem',fontWeight:900}}>🔥 STEAL OPPORTUNITY!</div>
            <div style={{color:'#ddd',marginTop:4,fontSize:'.9rem'}}>{players[current]?players[current].name:'Player'} — answer for points!</div>
          </div>
        )}
        <div className="q-box">
          <div className="how-would">❓ How would you answer this?</div>
          <div className="q-text">{currentQ?currentQ.q:''}</div>
        </div>

        {/* HINT SECTION */}
        <div className="hint-bar">
          {!hintShown?(
            <button className="hint-btn" onClick={showHint} disabled={submitDisabled}>
              💡 Show Key Concepts — costs −{HINT_PENALTY} points
            </button>
          ):(
            <div className="hint-box">
              <h4>💡 Key Concepts to Cover <span style={{color:'#e05c5c',fontWeight:700'}}>(−{HINT_PENALTY} pts deducted)</span></h4>
              {currentQ&&currentQ.hints.map((h,i)=>(
                <div key={i} className="hint-concept">
                  <span className="hint-concept-icon">{'①②③'[i]||'•'}</span>
                  <span>{h}</span>
                </div>
              ))}
              <div className="hint-penalty">Hint penalty of −{HINT_PENALTY} points has been applied to your score.</div>
            </div>
          )}
        </div>

        <div className="ans-area">
          <div className="mic-row">
            <textarea value={answer} onChange={e=>setAnswer(e.target.value)} disabled={submitDisabled}
              placeholder={micSupported?"Type your answer here — or tap 🎤 to speak it…":"Type your LDS apologetic response here…"}/>
            {micSupported&&(
              <button className={`mic-btn${listening?' listening':''}`} onClick={toggleMic} disabled={submitDisabled} title={listening?'Stop listening':'Start voice input'}>
                {listening?'⏹':'🎤'}
              </button>
            )}
          </div>
          {micSupported&&<div className={`mic-status${listening?' active':micStatus.startsWith('✅')?' done':''}`}>{micStatus}</div>}
          <div className="btn-row">
            <button className="btn btn-gold" disabled={submitDisabled} onClick={submitAnswer}>{submitLabel}</button>
            <button className="btn btn-red" onClick={skipQuestion}>⏭️ Skip / Pass</button>
          </div>
        </div>
      </div>

      {/* BONUS */}
      <div className={`screen${screen==='bonus'?' active':''}`} style={{background:'linear-gradient(135deg,#0f3460,#1a1a2e)'}}>
        <div className="bonus-title">📖 Scripture Bonus!</div>
        <div className="bonus-sub">Which Bible verse best supports the LDS apologetic response?<br/><strong style={{color:'#ffd700'}}>+10 bonus points if correct!</strong></div>
        <div className="bonus-ctx">"{currentQ?currentQ.q.slice(0,130):''}…"</div>
        {bonusOpts.map((o,i)=>(
          <button key={i}
            className={`scr-opt${bonusPicked===i?(o.correct?' correct':' wrong'):''}${bonusPicked!==null&&o.correct?' correct':''}`}
            disabled={bonusPicked!==null} onClick={()=>pickBonus(i)}>
            📖 {o.ref}
          </button>
        ))}
        <button className="btn btn-blue" style={{marginTop:12}} onClick={advanceTurn}>Skip Bonus</button>
      </div>

      {/* FINAL */}
      <div className={`screen${screen==='final'?' active':''}`} style={{background:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)'}}>
        <div className="trophy">🏆</div>
        <div style={{color:'#aaa',marginTop:8,fontSize:'.95rem'}}>
          {rankedPlayers.length>1&&rankedPlayers[0].total===rankedPlayers[1].total?"It's a tie!":'🏆 Winner'}
        </div>
        <div className="winner-name">{rankedPlayers[0]?rankedPlayers[0].name:''}</div>
        <div className="final-scores">
          {rankedPlayers.map((p,rank)=>(
            <div key={p.idx} className="fpc">
              <div className="fpc-rank">{MEDALS[rank]||'🎖️'}</div>
              <div className="fpc-name">{p.name}</div>
              <div className="fpc-pts">{p.total}</div>
              <div style={{color:'#aaa',fontSize:'.78rem'}}>points</div>
            </div>
          ))}
        </div>
        <div style={{fontSize:'.95rem',color:'#ffd700',marginBottom:10,fontWeight:700}}>Score by Category</div>
        <div className="cat-grid">
          {CATS.map(c=>(
            <div key={c.id} className="cat-row">
              <span>{c.emoji} {c.name}</span>
              <span style={{display:'flex',gap:6}}>
                {players.map((p,i)=><span key={i} style={{color:c.col,fontWeight:700}}>{p.cats[c.id]||0}</span>)}
              </span>
            </div>
          ))}
        </div>
        <button className="btn btn-gold" style={{marginTop:22}} onClick={resetGame}>🔄 Play Again</button>
      </div>

      {/* ADMIN */}
      <div className={`screen${screen==='admin'?' active':''}`} style={{background:'linear-gradient(135deg,#1a1a2e,#16213e)'}}>
        <div style={{fontSize:'2rem',fontWeight:900,color:'#ffd700',marginBottom:18}}>⚙️ Admin Panel</div>
        <div className="card" style={{maxWidth:700}}>
          <h2>Add New Question</h2>
          <label className="admin-label">Category</label>
          <select value={adminQ.cat} onChange={e=>setAdminQ(q=>({...q,cat:parseInt(e.target.value)}))}>
            {CATS.map(c=><option key={c.id} value={c.id}>{c.emoji} {c.name}</option>)}
          </select>
          <label className="admin-label">Anti-Mormon Statement</label>
          <textarea value={adminQ.q} onChange={e=>setAdminQ(q=>({...q,q:e.target.value}))} style={{minHeight:80}}/>
          <label className="admin-label">LDS Apologetic Answer (full)</label>
          <textarea value={adminQ.ans} onChange={e=>setAdminQ(q=>({...q,ans:e.target.value}))} style={{minHeight:80}}/>
          <label className="admin-label">Key Concept Hint 1</label>
          <input value={adminQ.h1} onChange={e=>setAdminQ(q=>({...q,h1:e.target.value}))} placeholder="First core point a player should mention"/>
          <label className="admin-label">Key Concept Hint 2</label>
          <input value={adminQ.h2} onChange={e=>setAdminQ(q=>({...q,h2:e.target.value}))} placeholder="Second core point"/>
          <label className="admin-label">Key Concept Hint 3</label>
          <input value={adminQ.h3} onChange={e=>setAdminQ(q=>({...q,h3:e.target.value}))} placeholder="Third core point"/>
          <label className="admin-label">Correct Scripture Reference</label>
          <input value={adminQ.scr} onChange={e=>setAdminQ(q=>({...q,scr:e.target.value}))} placeholder="e.g. Acts 10:34"/>
          <label className="admin-label">Scripture Note</label>
          <input value={adminQ.scrN} onChange={e=>setAdminQ(q=>({...q,scrN:e.target.value}))} placeholder="Brief explanation"/>
          <label className="admin-label">Wrong Scripture Option 1</label>
          <input value={adminQ.w1} onChange={e=>setAdminQ(q=>({...q,w1:e.target.value}))} placeholder="e.g. John 3:16"/>
          <label className="admin-label">Wrong Scripture Option 2</label>
          <input value={adminQ.w2} onChange={e=>setAdminQ(q=>({...q,w2:e.target.value}))} placeholder="e.g. Romans 8:28"/>
          <div className="btn-row" style={{justifyContent:'flex-start'}}>
            <button className="btn btn-gold" onClick={()=>{
              if(!adminQ.q||!adminQ.ans){alert('Question and answer required.');return;}
              setQs(prev=>[...prev,{
                id:Date.now(),cat:adminQ.cat,q:adminQ.q,ans:adminQ.ans,
                hints:[adminQ.h1||'Main apologetic principle',adminQ.h2||'Supporting evidence',adminQ.h3||'Church acknowledgment'],
                scr:adminQ.scr||'Genesis 1:1',scrN:adminQ.scrN||'',
                wrong:[adminQ.w1||'John 3:16',adminQ.w2||'Romans 8:28'],
              }]);
              setAdminMsg('✅ Question added! Total: '+(qs.length+1));
              setAdminQ({cat:0,q:'',ans:'',scr:'',scrN:'',w1:'',w2:'',h1:'',h2:'',h3:''});
            }}>➕ Add Question</button>
            <button className="btn btn-red" onClick={()=>setScreen('setup')}>← Back to Setup</button>
          </div>
          {adminMsg&&<div style={{marginTop:10,color:'#5aab6a',fontWeight:700}}>{adminMsg}</div>}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
